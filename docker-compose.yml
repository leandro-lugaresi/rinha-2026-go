services:
  haproxy:
    image: haproxy:2.9-alpine
    ports:
      - "9999:9999"
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "20M"
    networks:
      - backend

  api01:
    build:
      context: .
      dockerfile: Dockerfile
      platforms:
        - linux/amd64
    environment:
      PORT: "9999"
      RINHA_INDEX_PATH: /app/references.ivf
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "160M"
    networks:
      - backend

  api02:
    build:
      context: .
      dockerfile: Dockerfile
      platforms:
        - linux/amd64
    environment:
      PORT: "9999"
      RINHA_INDEX_PATH: /app/references.ivf
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "160M"
    networks:
      - backend

networks:
  backend:
    driver: bridge
